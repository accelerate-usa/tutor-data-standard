name: Release Scale Test

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  million-row-ingest:
    name: Million-row ingest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            toolkit/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run opt-in million-row scale test
        env:
          DATAS_RUN_FULL_STRESS_TEST: "1"
        run: pytest -q tests/test_large_ingest.py
